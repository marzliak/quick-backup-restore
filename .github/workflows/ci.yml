name: CI

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y restic jq openssl curl

          # Install yq from GitHub
          YQ_VERSION="v4.44.1"
          sudo curl -sL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Verify dependencies
        run: |
          restic version
          jq --version
          yq --version

      - name: Run test suite
        run: bash bin/test.sh
